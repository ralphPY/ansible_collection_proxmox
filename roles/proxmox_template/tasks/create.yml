- name: Check if template exists via proxmox module
  community.proxmox.proxmox_kvm:
    api_host: "{{ proxmox_host }}"
    api_user: "{{ proxmox_user }}"
    api_token_id: "{{ proxmox_token_id }}"
    api_token_secret: "{{ proxmox_token_secret }}"
    validate_certs: "{{ proxmox_validate_certs | default(false) }}"
    vmid: "{{ template_vmid }}"
    node: "{{ proxmox_node }}"
    state: info
  register: template_status
  failed_when: false
  changed_when: false

- set_fact:
    template_exists: "{{ template_status.failed == true }}"  # when using proxmox module

