- name: Convert to template
  when: not template_exists or force_recreate_template
  delegate_to: "{{ proxmox_host }}"
  become: true
  command: >
    qm stop {{ template_vmid }}

- name: Pause for 3 seconds
  when: not template_exists or force_recreate_template
  ansible.builtin.pause:
    seconds: 3

- name: Convert to template
  when: not template_exists or force_recreate_template
  delegate_to: "{{ proxmox_host }}"
  become: true
  command: >
    qm template {{ template_vmid }}


