- name: Configure cloud-init
  when: cloudinit | default(false)
  community.general.proxmox_kvm:
    api_host: "{{ proxmox_host }}"
    api_user: "{{ proxmox_user }}"
    api_token_id: "{{ proxmox_token_id }}"
    api_token_secret: "{{ proxmox_token_secret }}"
    validate_certs: "{{ validate_certs }}"
    node: "{{ proxmox_node }}"
    vmid: "{{ template_vmid }}"
    ciuser: "{{ ciuser }}"
    sshkeys: "{{ ciuser_pub_key }}"
    ipconfig:
      ipconfig0: "{{ template_ipconfig | default('ip=dhcp') }}"

    # user_data: |
    #   #cloud-config
    #   # 1. User & SSH Setup (Since user_data overrides GUI fields)
